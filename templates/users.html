{% extends 'base.html' %}

{% block title %}Users{% endblock %}

{% block content %}
<h2>Registered Users</h2>

{% if users %}
<table border="1" cellpadding="8">
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
    </tr>
    {% for user in users %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No users registered yet.</p>
{% endif %}

{% endblock %}
